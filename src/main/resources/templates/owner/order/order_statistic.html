<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <th:block th:replace="owner/restaurant/dashboard :: restaurant-content"></th:block>
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
            min-height: 100vh;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .table thead {
            background: linear-gradient(90deg, #42a5f5, #5c6bc0);
            color: white;
        }

        .table-hover tbody tr:hover {
            background-color: #f0f8ff;
            transition: 0.3s;
        }

        .dish-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
        }

        .search-box {
            max-width: 280px;
        }

        .total-box {
            background: linear-gradient(90deg, #ffebee, #ffcdd2);
            border: 2px solid #e57373;
            border-radius: 12px;
            padding: 15px 20px;
            display: inline-block;
            min-width: 280px;
            box-shadow: 0 4px 12px rgba(229, 115, 115, 0.3);
        }

        .total-box h5 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: #b71c1c;
        }

        .total-box span {
            font-size: 1.6rem;
            font-weight: 800;
            color: #d32f2f;
        }
    </style>
</head>
<body class="p-4">
<div class="wapper">
    <div th:replace="owner/restaurant/dashboard :: restaurant-sidebar"></div>
    <div class="main-panel">
        <div th:replace="owner/restaurant/dashboard :: restaurant-navbar"></div>
        <div class="container">
            <div class="card p-4">
                <h2 class="mb-4 text-center text-primary fw-bold">
                    <i class="fa-solid fa-receipt"></i> Chi tiết đơn hàng
                </h2>
                <!-- Toolbar -->
                <div class="d-flex flex-wrap justify-content-between mb-3 gap-2">
                    <input id="searchInput" type="text" class="form-control search-box"
                           placeholder="🔍 Tìm kiếm món ăn...">
                    <button class="btn btn-outline-primary" onclick="sortTable(1)">
                        <i class="fa-solid fa-arrow-down-a-z"></i> Sắp xếp theo Tên món
                    </button>
                </div>
                <div class="mt-3 text-end">
                    <div class="total-box">
                        <h5>
                            <i class="me-2"></i> Tổng số sản phẩm:
                            <span th:text="${sum}"></span>
                        </h5>
                    </div>
                </div>

                <!-- Thông báo không có dữ liệu -->
                <div th:if="${orderDetailList != null and orderDetailList.isEmpty()}" class="alert alert-info"
                     role="alert">
                    <i class="fa-solid fa-info-circle"></i> Đơn hàng này chưa có chi tiết.
                </div>

                <!-- Bảng chi tiết -->
                <div th:if="${orderDetailList != null and !orderDetailList.isEmpty()}">
                    <h5 class="mb-3"><i class="fa-solid fa-list"></i> Chi tiết đơn hàng</h5>
                    <div class="table-responsive">
                        <table id="orderTable" class="table table-hover align-middle text-center">
                            <thead>
                            <tr>
                                <th scope="col">Mã đơn</th>
                                <th scope="col">Món ăn</th>
                                <th scope="col">Hình ảnh</th>
                                <th scope="col">Người đặt</th>
                                <th scope="col">Số lượng</th>
                                <th scope="col">Giá</th>
                                <th scope="col">Thành tiền</th>
                                <th scope="col">Trạng thái</th>
                                <th scope="col">Xem chi tiết</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="row : ${orderDetailList}">
                                <td th:text="${row.getOrder().getId()}"></td>
                                <td th:text="${row.getDish().getName()}"></td>
                                <td>
                                    <img th:src="@{'/images/' + ${row.getDish().getPictureUrl()}}" alt="Ảnh món"
                                         class="dish-img">
                                </td>
                                <td th:text="${row.getOrder().getUser().getUsername()}"></td>
                                <td th:text="${row.getQuantity()}"></td>
                                <td th:text="${#numbers.formatDecimal(row.getDish().getPrice(), 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                <td th:text="${#numbers.formatDecimal(row.getQuantity() * row.getDish().getPrice(), 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                <td>
            <span class="badge bg-success px-3 py-2"
                  th:if="${row.getOrder().getOrderStatus().getName() == 'Đã duyệt'}"
                  data-bs-toggle="tooltip" title="Đơn hàng đã được duyệt"
                  th:text="${row.getOrder().getOrderStatus().getName()}"></span>
                                    <span class="badge bg-warning text-dark px-3 py-2"
                                          th:if="${row.getOrder().getOrderStatus().getName() == 'Chờ xử lý'}"
                                          data-bs-toggle="tooltip" title="Đơn hàng đang chờ xử lý"
                                          th:text="${row.getOrder().getOrderStatus().getName()}"></span>
                                    <span class="badge bg-danger px-3 py-2"
                                          th:if="${row.getOrder().getOrderStatus().getName() == 'Đã hủy'}"
                                          data-bs-toggle="tooltip" title="Đơn hàng đã bị hủy"
                                          th:text="${row.getOrder().getOrderStatus().getName()}"></span>
                                    <span class="badge bg-info px-3 py-2"
                                          th:if="${row.getOrder().getOrderStatus().getName() != 'Đã duyệt' && row.getOrder().getOrderStatus().getName() != 'Chờ xử lý' && row.getOrder().getOrderStatus().getName() != 'Đã hủy'}"
                                          th:text="${row.getOrder().getOrderStatus().getName()}"></span>
                                </td>
                                <td>
                                    <a th:href="@{'/order_statistic/dish/' + ${row.getDish().getId()}}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Tooltip init
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
    const tooltipList = [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el))

    // Tìm kiếm
    document.getElementById('searchInput').addEventListener('keyup', function () {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#orderTable tbody tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
        });
    });

    // Sắp xếp
    function sortTable(colIndex) {
        let table = document.getElementById("orderTable");
        let switching = true, shouldSwitch, i;
        while (switching) {
            switching = false;
            let rows = table.rows;
            for (i = 1; i < (rows.length - 1); i++) {
                shouldSwitch = false;
                let x = rows[i].getElementsByTagName("TD")[colIndex];
                let y = rows[i + 1].getElementsByTagName("TD")[colIndex];
                if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
                    shouldSwitch = true;
                    break;
                }
            }
            if (shouldSwitch) {
                rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                switching = true;
            }
        }
    }
</script>
</body>
</html>
