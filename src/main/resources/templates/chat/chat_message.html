<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tư vấn dinh dưỡng - FoodDelivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/index.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Page wrapper ── */
        .chat-container {
            max-width: 800px;
            margin: 20px auto 40px auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 12px rgba(238,77,45,0.06);
            border: 1px solid rgba(238,77,45,0.08);
            overflow: hidden;
            flex-grow: 1;
        }

        /* ── Header ── */
        .chat-header {
            background: linear-gradient(135deg, #ee4d2d 0%, #ff6633 100%);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .chat-header-avatar {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .chat-header-avatar i { color: #fff; font-size: 1.2rem; }
        .chat-header-info h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            letter-spacing: 0.01em;
        }
        .chat-header-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.85rem; color: rgba(255,255,255,0.9);
            margin-top: 2px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.45} }
        .chat-header-back {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            border: none; cursor: pointer;
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none;
            transition: background 0.2s;
        }
        .chat-header-back:hover { background: rgba(255,255,255,0.3); color: #fff; }

        /* ── Chat window ── */
        #chat-window {
            height: 500px;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #f8f9fa;
            scroll-behavior: smooth;
        }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 6px; }

        /* Welcome card */
        .welcome-card {
            display: flex; align-items: flex-start; gap: 10px;
            background: #fff3f0;
            border: 1px solid rgba(238,77,45,0.15);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            padding: 14px 16px;
            font-size: 0.95rem;
            color: #c0392b;
            line-height: 1.5;
            animation: fade-up 0.3s ease;
        }
        .welcome-card i { font-size: 1.2rem; margin-top: 1px; color: #ee4d2d; flex-shrink: 0; }

        /* Messages */
        .message { display: flex; flex-direction: column; gap: 4px; animation: fade-up 0.22s ease; }
        @keyframes fade-up { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }

        .message .msg-label {
            font-size: 0.75rem; font-weight: 600;
            letter-spacing: 0.07em; text-transform: uppercase;
            color: #adb5bd;
        }
        .message.user { align-items: flex-end; }
        .message.user .msg-label { color: #ee4d2d; }

        .message .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem; line-height: 1.6;
            white-space: pre-wrap; max-width: 80%;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #ee4d2d, #ff6633);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 3px 10px rgba(238,77,45,0.25);
        }
        .message.bot .bubble {
            background: #fff;
            color: #1e293b;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* Typing dots */
        .typing .bubble {
            display: flex; gap: 6px; align-items: center;
            padding: 16px 20px;
            background: #fff;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .typing .bubble span {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ee4d2d;
            animation: blink-dot 1.2s ease-in-out infinite;
        }
        .typing .bubble span:nth-child(2){animation-delay:.2s}
        .typing .bubble span:nth-child(3){animation-delay:.4s}
        @keyframes blink-dot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

        /* ── Input area ── */
        .chat-input-area {
            padding: 18px 24px;
            background: #fff;
            border-top: 1px solid #f1f3f5;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            border: 1.5px solid #dee2e6;
            border-radius: 30px;
            padding: 8px 8px 8px 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-row:focus-within {
            border-color: #ee4d2d;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(238,77,45,0.1);
        }
        #user-input {
            flex: 1; background: transparent; border: none;
            color: #1e293b; font-size: 1rem;
            outline: none; padding: 6px 0;
            font-family: inherit;
        }
        #user-input::placeholder { color: #adb5bd; }

        #send-btn {
            background: linear-gradient(135deg, #ee4d2d, #ff6633);
            color: #fff; border: none;
            width: 46px; height: 46px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 3px 10px rgba(238,77,45,0.35);
        }
        #send-btn:hover { transform: scale(1.07); box-shadow: 0 5px 16px rgba(238,77,45,0.45); }
        #send-btn:active { transform: scale(0.94); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        #send-btn i { font-size: 1.1rem; }

        /* Hint text */
        .input-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #adb5bd;
            margin-top: 10px;
            margin-bottom: 0;
        }

        /* ── Error toast ── */
        #error-msg {
            display: none;
            margin: 0 20px 10px;
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-radius: 10px;
            color: #dc2626;
            font-size: 0.9rem;
            padding: 12px 16px;
        }

        .page-header {
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            border-bottom: 1px solid rgba(238, 77, 45, 0.1);
            box-shadow: 0 4px 15px rgba(238, 77, 45, 0.05);
            padding: 30px 0;
            margin-bottom: 10px;
            text-align: center;
        }
        .page-header h2 {
            color: #ee4d2d;
            margin: 0;
            font-weight: 700;
        }
        .page-header p {
            color: #6c757d;
            margin-top: 10px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{user/fragments/user_navbar :: navbar}"></div>

<!-- Header phụ -->
<div class="page-header">
    <div class="container">
        <h2><i class="fas fa-heartbeat me-2"></i>Tư vấn Dinh dưỡng Thông minh</h2>
        <p>Chat với Trợ lý AI để có những bữa ăn lành mạnh và phù hợp với mục tiêu của bạn.</p>
    </div>
</div>

<div class="container chat-container">
    <div class="chat-wrapper">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="chat-header-info">
                <h1>Trợ lý dinh dưỡng FoodDelivery</h1>
                <div class="chat-header-status">
                    <span class="status-dot"></span>
                    Trực tuyến &bull; Luôn sẵn sàng hỗ trợ bạn
                </div>
            </div>
            <a href="/" class="chat-header-back" title="Về trang chủ">
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>

        <!-- Chat window -->
        <div id="chat-window"></div>

        <!-- Error -->
        <div id="error-msg"></div>

        <!-- Input area -->
        <div class="chat-input-area">
            <div class="input-row">
                <input
                    type="text"
                    id="user-input"
                    placeholder="Bạn muốn ăn gì, hay có mục tiêu dinh dưỡng nào không?"
                    autocomplete="off"
                />
                <button id="send-btn" aria-label="Gửi">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <p class="input-hint">Nhấn Enter hoặc bấm nút gửi để trò chuyện cùng trợ lý</p>
        </div>

    </div>
</div>

<!-- Footer -->
<div th:replace="~{homepage/index :: home_footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput  = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const errorMsg   = document.getElementById('error-msg');

    // Welcome message
    (function showWelcome() {
        const el = document.createElement('div');
        el.className = 'welcome-card';
        el.innerHTML = `
            <i class="fas fa-utensils"></i>
            <span>Xin chào! Tôi là trợ lý dinh dưỡng của FoodDelivery. Hãy hỏi tôi bất cứ điều gì về chế độ ăn uống, thực phẩm lành mạnh, hay gợi ý món ăn phù hợp với bạn!</span>
        `;
        chatWindow.appendChild(el);
    })();

    // Helpers
    function appendMessage(role, text) {
        const wrap   = document.createElement('div');
        wrap.className = `message ${role}`;
        const label  = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = role === 'user' ? 'Bạn' : 'Trợ lý';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        wrap.appendChild(label);
        wrap.appendChild(bubble);
        chatWindow.appendChild(wrap);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return wrap;
    }

    function showTyping() {
        const wrap = document.createElement('div');
        wrap.className = 'message bot typing';
        wrap.id = 'typing-indicator';
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = 'Trợ lý';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<span></span><span></span><span></span>';
        wrap.appendChild(label);
        wrap.appendChild(bubble);
        chatWindow.appendChild(wrap);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTyping() { document.getElementById('typing-indicator')?.remove(); }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }
    function clearError() {
        errorMsg.style.display = 'none';
        errorMsg.textContent = '';
    }

    // Send logic
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        clearError();
        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;
        showTyping();

        try {
            const res = await fetch('/chat/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    request:  text,
                    goal:     'lose_weight',
                    diseases: []
                })
            });

            removeTyping();
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `Lỗi ${res.status}`);
            }
            const data = await res.json();
            appendMessage('bot', data.response ?? 'Không có phản hồi.');
        } catch (err) {
            removeTyping();
            showError('Lỗi kết nối: ' + err.message);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
