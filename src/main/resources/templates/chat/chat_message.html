<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
</head>
<body>

<h3>Welcome to Chatbot</h3>

<form method="post" th:action="@{/chat/message}" th:object="${chatRequest}">

    <input type="text" th:field="*{request}" placeholder="Nhập câu hỏi..." />

    <select th:field="*{goal}">
        <option value="lose_weight">Giảm cân</option>
        <option value="gain_muscle">Tăng cơ</option>
    </select>

    <label>
        <input type="checkbox" th:field="*{diseases}" value="diabetes">
        Tiểu đường
    </label>

    <label>
        <input type="checkbox" th:field="*{diseases}" value="heart">
        Tim mạch
    </label>

    <button type="submit">Gửi</button>
</form>

<div>
    <p><b>Bot:</b> <span th:text="${response}"></span></p>
</div>

<hr>

<div th:if="${response}">
    <h4>Bot response:</h4>
    <p th:text="${response}"></p>
</div>

</body>
</html>
